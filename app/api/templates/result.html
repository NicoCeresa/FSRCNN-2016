<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Resolution Image</title>
    <style>
        /* Your CSS styles here */
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            background-image: url('/static/.other_ims/stars.gif'); /* Add this line to set the background image */
            background-repeat: repeat; /* Adjust this based on your preference */
            color: #fff
        }

        img {
            max-width: 100%;
            height: auto; /* Maintain aspect ratio */
            display: block;
            margin: 0 auto;
        }

        .container {
            max-width: 1200px;
            width: 100%;
            padding: 20px;
            text-align: center;
            align-self: flex-start; /* Align container to the top */
        }

        .title-container {
            margin-bottom: 20px;
        }

        .home-btn {
            text-align: center;
            position: absolute;
            top: 20px;
            right: 20px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* 2 columns */
            gap: 20px; /* Space between grid items */
            margin-top: 20px;
        }

        .column {
            padding: 10px;
            box-sizing: border-box;
        }

        .input {
            background-color: #0015ff;
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
            transition: background-color 0.3s;
            border-radius: 5px; /* Add border-radius to round the edges */
        }

        .input:hover {
            background-color: #0056b3;
        }

        .image-container {
            text-align: center;
            display: flex;
        }

        .image-container img {
            max-width: 100%;
            height: auto;
            display: block; /* Ensure image takes up full width */
            margin: 0 auto; /* Center the image */
            flex:1;
        }

        .image-label {
            text-align: center;
            margin-bottom: 10px;
            font-size: 18px;
            color: #fff;
        }

        .download-btn {
            text-align: center; /* Align button center */
            margin-top: 20px; /* Add top margin for spacing */
        }

        /* Responsive layout for mobile */
        @media (max-width: 768px) {
            .row {
                grid-template-columns: 1fr; /* Single column on mobile */
            }
            
            .home-btn {
                position: static;
                margin-bottom: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title-container">
            <h1>Super Resolution Image</h1>
        </div>

        <div class="home-btn">
            <form action="{{ url_for('home')}}" method="get" enctype='multipart/form-data'>
                <input class="input" type="submit" name="Continue" value="Home">
            </form>
        </div>
        
        {% if image_name %}
        <div class="row">
            <div class="column">
                <h2 class="image-label">Input Image</h2>
                <div class="image-container">
                    <img src="static/input/{{original_name}}" alt="Input Image" id="input-image">
                </div>
            </div>
            {% if 2 in scales %}
            <div class="column">
                <h2 class="image-label">2× Upscaled</h2>
                <div class="image-container">
                    <img src="/static/output/X2/X2_{{image_name}}" alt="Output Image X2" id="output-image-2">
                </div>
                <!-- Move the download button here -->
                <div class="download-btn">
                    <a href="{{ url_for('download_img', filename='X2/X2_' + image_name) }}" download="X2_{{image_name}}" class="input" style="display: inline-block; text-decoration: none; text-align: center; line-height: 40px;">Download</a>
                </div>
            </div>
            {% endif %}
            {% if 3 in scales %}
            <div class="column">
                <h2 class="image-label">3× Upscaled</h2>
                <div class="image-container">
                    <img src="/static/output/X3/X3_{{image_name}}" alt="Output Image X3" id="output-image-3">
                </div>
                <!-- Move the download button here -->
                <div class="download-btn">
                    <a href="{{ url_for('download_img', filename='X3/X3_' + image_name) }}" download="X3_{{image_name}}" class="input" style="display: inline-block; text-decoration: none; text-align: center; line-height: 40px;">Download</a>
                </div>
            </div>
            {% endif %}
            {% if 4 in scales %}
            <div class="column">
                <h2 class="image-label">4× Upscaled</h2>
                <div class="image-container">
                    <img src="/static/output/X4/X4_{{image_name}}" alt="Output Image X4" id="output-image-4">
                </div>
                <!-- Move the download button here -->
                <div class="download-btn">
                    <a href="{{ url_for('download_img', filename='X4/X4_' + image_name) }}" download="X4_{{image_name}}" class="input" style="display: inline-block; text-decoration: none; text-align: center; line-height: 40px;">Download</a>
                </div>
            </div>
            {% endif %}
        </div>
        {% endif %}
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const inputImage = document.getElementById('input-image');
            const outputImage2 = document.getElementById('output-image-2');
            const outputImage3 = document.getElementById('output-image-3');
            const outputImage4 = document.getElementById('output-image-4');
            
            const columns = document.querySelectorAll('.column');
    
            if (inputImage) {
                inputImage.onload = () => {
                    const inputWidth = inputImage.naturalWidth;
                    const inputHeight = inputImage.naturalHeight;
                    columns[0].querySelector('.image-label').innerText += ` (${inputWidth}x${inputHeight})`;
                };
            }

            if (outputImage2) {
                outputImage2.onload = () => {
                    const inputWidth = inputImage.naturalWidth;
                    const inputHeight = inputImage.naturalHeight;
                    const outputWidth = inputWidth * 2;
                    const outputHeight = inputHeight * 2;
                    columns[1].querySelector('.image-label').innerText += ` (${outputWidth}x${outputHeight})`;
                };
            }
    
            if (outputImage3) {
                outputImage3.onload = () => {
                    const inputWidth = inputImage.naturalWidth;
                    const inputHeight = inputImage.naturalHeight;
                    const outputWidth = inputWidth * 3;
                    const outputHeight = inputHeight * 3;
                    columns[2].querySelector('.image-label').innerText += ` (${outputWidth}x${outputHeight})`;
                };
            }

            if (outputImage4) {
                outputImage4.onload = () => {
                    const inputWidth = inputImage.naturalWidth;
                    const inputHeight = inputImage.naturalHeight;
                    const outputWidth = inputWidth * 4;
                    const outputHeight = inputHeight * 4;
                    columns[3].querySelector('.image-label').innerText += ` (${outputWidth}x${outputHeight})`;
                };
            }
        });
    </script>
</body>
</html>
