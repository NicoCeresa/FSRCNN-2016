<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FSRCNN — Image Super-Resolution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: {
                            50:  '#fdfbf7',
                            100: '#f5f0e8',
                            200: '#e8dfd0',
                        },
                        forest: {
                            400: '#52976e',
                            500: '#2d6a4f',
                            600: '#1b4332',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .drop-zone.dragging {
            border-color: #2d6a4f;
            background-color: #f0f7f3;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinner {
            border: 4px solid #e8dfd0;
            border-top-color: #2d6a4f;
            border-radius: 50%;
            width: 48px;
            height: 48px;
            animation: spin 0.8s linear infinite;
        }
    </style>
</head>
<body class="min-h-screen bg-cream-100 flex flex-col items-center justify-center px-4 py-8 font-sans">

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="hidden fixed inset-0 bg-forest-600/80 z-50 flex flex-col items-center justify-center gap-4">
        <div class="spinner"></div>
        <p class="text-cream-50 text-lg font-medium tracking-wide">Processing your image...</p>
    </div>

    <!-- Card -->
    <div class="w-full max-w-2xl bg-cream-50 rounded-2xl shadow-lg border border-cream-200 p-10">

        <!-- Header -->
        <div class="text-center mb-8">
            <span class="inline-block bg-forest-500 text-cream-50 text-xs font-semibold tracking-widest uppercase px-3 py-1 rounded-full mb-4">Super Resolution</span>
            <h1 class="text-3xl font-bold text-forest-600 tracking-tight">FSRCNN</h1>
            <p class="text-sm text-stone-500 mt-1">Upscale your images with a neural network trained on DIV2K</p>
        </div>

        <form id="uploadForm" method="post" action="{{ url_for('get_prediction') }}" enctype="multipart/form-data">

            <!-- Drop Zone -->
            <label for="inputfile" class="drop-zone block w-full border-2 border-dashed border-cream-200 rounded-xl p-14 text-center cursor-pointer hover:border-forest-500 hover:bg-cream-100 transition-colors mb-6 group">
                <div id="dropIcon" class="flex flex-col items-center gap-2 pointer-events-none">
                    <svg class="w-10 h-10 text-forest-400 group-hover:text-forest-500 transition-colors" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/>
                    </svg>
                    <span id="dropText" class="text-sm text-stone-500">Click to upload or drag & drop</span>
                    <span class="text-xs text-stone-400">JPG, PNG, BMP, WEBP — max 16 MB</span>
                </div>
                <input id="inputfile" type="file" name="image" accept=".jpg,.jpeg,.png,.bmp,.webp" class="hidden" required>
            </label>

            {% if error %}
            <p class="text-red-600 text-sm text-center mb-4 bg-red-50 border border-red-200 rounded-lg px-4 py-2">{{ error }}</p>
            {% endif %}

            <!-- Scale Options -->
            <fieldset class="mb-6">
                <legend class="text-xs font-semibold text-stone-500 uppercase tracking-widest mb-3">Upscale Factor</legend>
                <div class="flex gap-3">
                    {% for scale in [2, 3, 4] %}
                    <label class="flex-1 relative cursor-pointer">
                        <input type="checkbox" name="scale_x{{ scale }}" value="{{ scale }}" class="peer hidden">
                        <div class="text-center py-2 rounded-lg border-2 border-black bg-cream-100 text-sm font-medium text-black peer-checked:border-forest-500 peer-checked:bg-forest-500 peer-checked:text-cream-50 transition-colors select-none">
                            {{ scale }}×
                        </div>
                    </label>
                    {% endfor %}
                </div>
            </fieldset>

            <!-- Submit -->
            <button type="submit" class="w-full bg-forest-500 hover:bg-forest-600 text-cream-50 font-semibold py-3 rounded-xl transition-colors text-sm tracking-wide">
                Upscale Image
            </button>
        </form>
    </div>

    <!-- Footer -->
    <p class="mt-6 text-xs text-stone-400">
        Built by <a href="https://nico-ceresa.com" class="text-forest-500 hover:underline">Nico Ceresa</a>
        &mdash;
        <a href="https://github.com/NicoCeresa/FSRCNN-2016" class="text-forest-500 hover:underline">GitHub</a>
    </p>

    <script>
        const input = document.getElementById('inputfile');
        const dropText = document.getElementById('dropText');
        const dropZone = document.querySelector('.drop-zone');
        const form = document.getElementById('uploadForm');
        const overlay = document.getElementById('loadingOverlay');

        input.addEventListener('change', () => {
            if (input.files.length > 0) {
                dropText.textContent = input.files[0].name;
            }
        });

        ['dragenter', 'dragover'].forEach(e => {
            dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.add('dragging'); });
        });
        ['dragleave', 'drop'].forEach(e => {
            dropZone.addEventListener(e, ev => { ev.preventDefault(); dropZone.classList.remove('dragging'); });
        });
        dropZone.addEventListener('drop', ev => {
            const file = ev.dataTransfer.files[0];
            if (file) {
                const dt = new DataTransfer();
                dt.items.add(file);
                input.files = dt.files;
                dropText.textContent = file.name;
            }
        });

        form.addEventListener('submit', () => {
            if (input.files.length > 0) overlay.classList.remove('hidden');
        });
    </script>
</body>
</html>
